<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{ .Title }}</title>
<meta name="description" content="{{ .Description }}" />
<meta name="author" content="{{ site.Params.author }}" />
<meta name="robots" content="index, follow" />
<link rel="canonical" href="{{ .Permalink }}" />
<meta property="og:type" content="{{ if eq .Kind "page" }}article{{ else }}website{{ end }}" />
<meta property="og:site_name" content="{{ site.Params.author }}" />
<meta property="og:title" content="{{ .Title }}" />
<meta property="og:description" content="{{ .Params.socialDescription | default .Description }}" />
<meta property="og:url" content="{{ .Permalink }}" />
<meta property="og:image" content="{{ site.Params.ogImage }}" />
<meta name="twitter:card" content="summary" />
<meta name="twitter:title" content="{{ .Title }}" />
<meta name="twitter:description" content="{{ .Params.socialDescription | default .Description }}" />
<meta name="twitter:image" content="{{ site.Params.ogImage }}" />
{{ partial "head-assets.html" . }}
<link rel="stylesheet" href="{{ .Params.css | default "/styles/styles.css" }}" />
{{ partial "jsonld.html" . }}
