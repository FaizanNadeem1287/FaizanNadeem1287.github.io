{{ define "scripts" }}
    {{ partial "cursor.html" . }}
    <script>
      // Nav scroll effect
      const navbar = document.getElementById("navbar");
      const syncNavbar = () => {
        navbar.classList.toggle("scrolled", window.scrollY > 40);
      };
      window.addEventListener("scroll", syncNavbar);
      syncNavbar();

      // Scroll reveal
      const io = new IntersectionObserver(
        (entries) => {
          entries.forEach((e) => {
            if (e.isIntersecting) e.target.classList.add("visible");
          });
        },
        { threshold: 0.1 },
      );
      document.querySelectorAll(".reveal").forEach((el) => io.observe(el));

      // Hero reveal on load
      document
        .querySelectorAll(
          ".proj-breadcrumb,.proj-title-row,.proj-meta-strip,.proj-visual-wrap",
        )
        .forEach((el, i) => {
          el.style.opacity = "0";
          el.style.transform = "translateY(20px)";
          el.style.transition = `opacity .7s ease ${i * 0.12}s, transform .7s ease ${i * 0.12}s`;
          setTimeout(
            () => {
              el.style.opacity = "1";
              el.style.transform = "none";
            },
            80 + i * 120,
          );
        });

      // Code tabs
      function switchCode(idx, tab) {
        document
          .querySelectorAll(".code-tab")
          .forEach((t, i) => t.classList.toggle("active", i === idx));
        document
          .querySelectorAll(".code-panel")
          .forEach((p, i) => p.classList.toggle("active", i === idx));
      }

      function escapeHtml(value) {
        return value
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function highlightPython(pre) {
        let code = pre.textContent;
        code = escapeHtml(code);
        code = code.replace(/#.*$/gm, '<span class="cm">$&</span>');
        code = code.replace(
          /("""[\s\S]*?"""|'''[\s\S]*?'''|"(?:\\.|[^"\\])*"|'(?:\\.|[^'\\])*')/g,
          '<span class="str">$1</span>',
        );
        code = code.replace(
          /\b(async|await|class|def|return|from|import|as|if|else|elif|for|while|in|try|except|finally|with|pass|raise|yield|continue|break|and|or|not|is|None|True|False)\b/g,
          '<span class="kw">$1</span>',
        );
        code = code.replace(
          /\b(str|int|float|dict|list|set|tuple|bool|Any|Dict|List|Optional)\b/g,
          '<span class="tp">$1</span>',
        );
        code = code.replace(
          /\b([A-Z][A-Za-z0-9_]*)\b/g,
          '<span class="fn">$1</span>',
        );
        {{ with .Params.highlightNames }}
        code = code.replace(
          new RegExp("\\b(" + {{ delimit . "|" }} + ")\\b", "g"),
          '<span class="nm">$1</span>',
        );
        {{ end }}
        pre.innerHTML = code;
      }

      document.querySelectorAll(".code-panel pre").forEach(highlightPython);
    </script>
    {{ partial "ga.html" . }}
{{ end }}
