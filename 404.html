<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page not found — Faizan Nadeem</title>
    <meta name="robots" content="noindex" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/assets/favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/assets/favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/assets/favicon/favicon-16x16.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/styles.css" />
    <style>
      .nf-wrap {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
      }
      .nf-code {
        font-family: var(--mono);
        font-size: 0.8rem;
        color: var(--accent);
        letter-spacing: 0.12em;
        margin-bottom: 1rem;
      }
      .nf-title {
        font-family: var(--display);
        font-size: clamp(2rem, 5vw, 3.5rem);
        font-weight: 700;
        letter-spacing: -0.03em;
        margin-bottom: 1rem;
      }
      .nf-desc {
        color: var(--muted);
        max-width: 420px;
        line-height: 1.7;
        margin-bottom: 2rem;
      }
      .nf-links {
        display: flex;
        gap: 1.5rem;
      }
      .nf-links a {
        font-family: var(--mono);
        font-size: 0.78rem;
        color: var(--accent);
        text-decoration: none;
      }
      .nf-links a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="nf-wrap">
      <p class="nf-code">404 — not found</p>
      <h1 class="nf-title">This page doesn't exist.</h1>
      <p class="nf-desc">
        The page you're looking for may have been moved or removed. Head back
        home or browse my projects instead.
      </p>
      <div class="nf-links">
        <a href="/">← Back home</a>
        <a href="/projects/">View projects →</a>
      </div>
    </div>
  </body>
</html>
